<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent QA 測試工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/static/css/test_style.css">
</head>

<body class="bg-gray-50 min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- 標題與設定區塊 -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-6 border border-gray-200">
            <h1 class="text-2xl font-bold text-gray-800 mb-4 flex items-center">
                <i data-lucide="shield-check" class="mr-2 text-blue-600"></i>
                Agent 測試
            </h1>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 text-xs">測試 API 端點</label>
                    <input id="apiUrl" type="text" value="/api/test/run-test"
                        class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 bg-gray-50 focus:ring-blue-500 border text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 text-xs">測試人員 ID</label>
                    <input id="testerId" type="text" value="QA_PROD_VERIFY"
                        class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 bg-gray-50 border text-sm">
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- 左側：劇本清單 -->
            <div class="lg:col-span-3 space-y-4">
                <div
                    class="bg-white rounded-xl shadow-sm p-6 border border-gray-200 h-full max-h-[700px] overflow-y-auto">
                    <h2 class="font-semibold text-sm mb-4 text-gray-400 uppercase tracking-wider flex items-center">
                        <i data-lucide="library" class="w-4 h-4 mr-2"></i>標準劇本庫
                    </h2>
                    <div id="scenarioList" class="space-y-2">
                        <!-- 由 JS 動態載入 -->
                    </div>
                </div>
            </div>

            <!-- 中間：編輯器與輸入區 -->
            <div class="lg:col-span-4 space-y-4">
                <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-200 h-full flex flex-col">
                    <h2
                        class="font-semibold text-sm mb-4 text-gray-400 uppercase tracking-wider flex items-center justify-between">
                        <span class="flex items-center"><i data-lucide="edit-3" class="w-4 h-4 mr-2"></i>情境編輯器</span>
                        <button id="clearEditorBtn" class="text-blue-500 hover:text-blue-700 text-xs">清空</button>
                    </h2>

                    <div class="flex-grow space-y-4 overflow-y-auto pr-2" id="editorContainer">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1">情境名稱</label>
                            <input id="customName" type="text" placeholder="例如：手動測試血壓偏高"
                                class="w-full border-b border-gray-200 focus:border-blue-500 outline-none py-1 text-sm">
                        </div>

                        <div id="stepsContainer" class="space-y-4 pt-2">
                            <!-- 步驟區塊會動態新增 -->
                        </div>

                        <button id="addStepBtn"
                            class="w-full py-2 border-2 border-dashed border-gray-200 rounded-lg text-gray-400 text-xs hover:border-blue-300 hover:text-blue-500 transition-all flex items-center justify-center">
                            <i data-lucide="plus" class="w-4 h-4 mr-1"></i> 新增對話步驟
                        </button>
                    </div>

                    <div class="mt-4 pt-4 border-t border-gray-100">
                        <button id="runBtn" disabled
                            class="w-full py-3 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 disabled:bg-gray-200 transition-all flex items-center justify-center">
                            <i data-lucide="play" class="w-4 h-4 mr-2"></i> 執行當前情境
                        </button>
                    </div>
                </div>
            </div>

            <!-- 右側：日誌與結果 -->
            <div class="lg:col-span-5 space-y-4">
                <div
                    class="bg-white rounded-xl shadow-sm p-6 border border-gray-200 h-full flex flex-col min-h-[500px]">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="font-semibold text-sm text-gray-400 uppercase tracking-wider">執行日誌回饋</h2>
                        <span id="overallStatus"
                            class="px-2 py-0.5 rounded text-[10px] font-bold bg-gray-100 text-gray-400">IDLE</span>
                    </div>

                    <div id="testConsole"
                        class="flex-grow space-y-2 overflow-y-auto mb-4 p-4 bg-gray-900 rounded-lg font-mono text-[12px]">
                        <div class="text-gray-600">// 系統就緒，請編輯或選擇劇本...</div>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <button id="downloadReportBtn" disabled
                            class="py-2 bg-gray-100 text-gray-600 rounded text-xs font-medium hover:bg-gray-200 flex items-center justify-center">
                            <i data-lucide="download" class="w-3 h-3 mr-1"></i> 匯出 JSON
                        </button>
                        <button id="copyConsoleBtn"
                            class="py-2 bg-gray-100 text-gray-600 rounded text-xs font-medium hover:bg-gray-200 flex items-center justify-center">
                            <i data-lucide="copy" class="w-3 h-3 mr-1"></i> 複製 Log
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部圖表參考 -->
        <div class="mt-8 opacity-50 grayscale hover:grayscale-0 transition-all">
            <p class="text-[10px] text-gray-400 mb-2 italic">QA 參考指標：</p>
        </div>
    </div>

    <script src="/static/js/test_logic.js"></script>
</body>

</html>
